<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Tic-Tac-Toe</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; color: #333;
        }
        h1 { font-size: 3rem; margin-bottom: 5px; }
        .role-text { font-size: 1.2rem; color: #888; margin-bottom: 20px; font-weight: bold; }
        .status { font-size: 1.5rem; margin-bottom: 30px; color: #555; font-weight: 600; }
        
        .board {
            display: grid; grid-template-columns: repeat(3, 120px); grid-template-rows: repeat(3, 120px); gap: 12px;
            background-color: #2d3748; padding: 15px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        .cell {
            background-color: #ffffff; border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-size: 5rem; font-weight: bold; cursor: pointer; transition: background-color 0.2s, transform 0.1s;
        }
        .cell:hover { background-color: #e2e8f0; }
        .cell.x { color: #ef4444; } 
        .cell.o { color: #3b82f6; } 

        .reset-btn {
            margin-top: 40px; padding: 12px 24px; font-size: 1.2rem; font-weight: bold;
            background-color: #10b981; color: white; border: none; border-radius: 8px; cursor: pointer;
        }
        .reset-btn:hover { background-color: #059669; }
    </style>
</head>
<body>

    <h1>Tic-Tac-Toe</h1>
    <div class="role-text" id="roleText">Connecting to server...</div>
    <div class="status" id="status">Waiting for game data...</div>
    
    <div class="board" id="board">
        <div class="cell" data-index="0"></div><div class="cell" data-index="1"></div><div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div><div class="cell" data-index="4"></div><div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div><div class="cell" data-index="7"></div><div class="cell" data-index="8"></div>
    </div>

    <button class="reset-btn" id="resetBtn">Restart Game</button>

    <script>
        const cells = document.querySelectorAll('.cell');
        const statusText = document.getElementById('status');
        const roleText = document.getElementById('roleText');
        
        let myRole = "Spectator";
        let isMyTurn = false;

        // Automatically connect to the WebSocket endpoint of the server hosting this page
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(`${protocol}//${window.location.host}/ws`);

        // 1. Listen for messages from the server
        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            
            myRole = data.role;
            roleText.innerText = `You are playing as: ${myRole}`;

            if (data.players_connected < 2) {
                statusText.innerText = "Waiting for an opponent to join...";
            } else {
                isMyTurn = (data.current_turn === myRole);
                statusText.innerText = isMyTurn ? "It's your turn!" : `Waiting for Player ${data.current_turn}...`;
            }

            // Update the board UI
            data.board.forEach((val, index) => {
                const cell = cells[index];
                cell.innerText = val;
                cell.className = 'cell'; // Reset classes
                if (val === "X") cell.classList.add('x');
                if (val === "O") cell.classList.add('o');
            });
            
            checkWinLocally(data.board); // Just for displaying the win message
        };

        // 2. Send a move to the server
        cells.forEach(cell => {
            cell.addEventListener('click', (e) => {
                const index = e.target.getAttribute('data-index');
                // Only allow click if it's your turn and the spot is empty
                if (isMyTurn && e.target.innerText === "") {
                    ws.send(JSON.stringify({ action: "move", index: parseInt(index), player: myRole }));
                }
            });
        });

        // 3. Reset the game
        document.getElementById('resetBtn').addEventListener('click', () => {
            ws.send(JSON.stringify({ action: "reset" }));
        });

        function checkWinLocally(board) {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let [a, b, c] of wins) {
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    statusText.innerText = `🎉 Player ${board[a]} Wins! 🎉`;
                    isMyTurn = false;
                    return;
                }
            }
            if (!board.includes("")) {
                statusText.innerText = "It's a draw!";
                isMyTurn = false;
            }
        }
    </script>
</body>
</html>

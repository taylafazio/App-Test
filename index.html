<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Tic-Tac-Toe</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; color: #333; }
        h1 { font-size: 3rem; margin-bottom: 5px; }
        
        /* Lobby Styles */
        #lobby { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        input { font-size: 1.5rem; padding: 10px; width: 120px; text-align: center; letter-spacing: 3px; border: 2px solid #ccc; border-radius: 8px; margin-bottom: 15px;}
        button { padding: 10px 20px; font-size: 1.1rem; font-weight: bold; background-color: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; transition: background-color 0.2s; margin: 5px;}
        button:hover { background-color: #2563eb; }
        .generate-btn { background-color: #8b5cf6; }
        .generate-btn:hover { background-color: #7c3aed; }
        
        /* Game Styles (Hidden initially) */
        #gameArea { display: none; flex-direction: column; align-items: center; }
        .room-display { font-size: 1.2rem; background: #e2e8f0; padding: 5px 15px; border-radius: 20px; margin-bottom: 15px; font-weight: bold; letter-spacing: 2px;}
        .role-text { font-size: 1.2rem; color: #888; margin-bottom: 10px; font-weight: bold; }
        .status { font-size: 1.5rem; margin-bottom: 20px; color: #555; font-weight: 600; }
        .board { display: grid; grid-template-columns: repeat(3, 100px); grid-template-rows: repeat(3, 100px); gap: 10px; background-color: #2d3748; padding: 12px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
        .cell { background-color: #ffffff; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 4rem; font-weight: bold; cursor: pointer; transition: background-color 0.2s; }
        .cell:hover { background-color: #e2e8f0; }
        .cell.x { color: #ef4444; } 
        .cell.o { color: #3b82f6; } 
        .reset-btn { margin-top: 30px; background-color: #10b981; }
        .reset-btn:hover { background-color: #059669; }
    </style>
</head>
<body>

    <h1>Tic-Tac-Toe</h1>
    
    <div id="lobby">
        <p>Enter a 5-digit code to join a game:</p>
        <input type="text" id="roomInput" maxlength="5" placeholder="12345" autocomplete="off"><br>
        <button id="joinBtn">Join Game</button>
        <hr style="margin: 20px 0; border: 1px solid #eee;">
        <p>Or create a new private room:</p>
        <button class="generate-btn" id="generateBtn">Generate Random Code</button>
    </div>

    <div id="gameArea">
        <div class="room-display" id="roomDisplay">Room: -----</div>
        <div class="role-text" id="roleText">Connecting...</div>
        <div class="status" id="status">Waiting for data...</div>
        
        <div class="board" id="board">
            <div class="cell" data-index="0"></div><div class="cell" data-index="1"></div><div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div><div class="cell" data-index="4"></div><div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div><div class="cell" data-index="7"></div><div class="cell" data-index="8"></div>
        </div>
        <button class="reset-btn" id="resetBtn">Restart Game</button>
    </div>

    <script>
        // DOM Elements
        const lobby = document.getElementById('lobby');
        const gameArea = document.getElementById('gameArea');
        const roomInput = document.getElementById('roomInput');
        const roomDisplay = document.getElementById('roomDisplay');
        const cells = document.querySelectorAll('.cell');
        const statusText = document.getElementById('status');
        const roleText = document.getElementById('roleText');
        
        let ws;
        let myRole = "Spectator";
        let isMyTurn = false;

        // --- Lobby Logic ---
        document.getElementById('generateBtn').addEventListener('click', () => {
            const randomCode = Math.floor(10000 + Math.random() * 90000).toString();
            roomInput.value = randomCode;
        });

        document.getElementById('joinBtn').addEventListener('click', () => {
            const code = roomInput.value.trim();
            if (code.length === 5 && !isNaN(code)) {
                connectToRoom(code);
            } else {
                alert("Please enter a valid 5-digit number.");
            }
        });

        // --- Game Logic ---
        function connectToRoom(roomCode) {
            // Hide lobby, show game
            lobby.style.display = 'none';
            gameArea.style.display = 'flex';
            roomDisplay.innerText = `Room: ${roomCode}`;

            // Connect to WebSocket with the specific room code in the URL
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws/${roomCode}`);

            ws.onmessage = function(event) {
                const data = JSON.parse(event.data);
                
                myRole = data.role;
                roleText.innerText = `You are playing as: ${myRole}`;

                if (data.players_connected < 2) {
                    statusText.innerText = "Waiting for an opponent to join...";
                } else {
                    isMyTurn = (data.current_turn === myRole);
                    statusText.innerText = isMyTurn ? "It's your turn!" : `Waiting for Player ${data.current_turn}...`;
                }

                data.board.forEach((val, index) => {
                    const cell = cells[index];
                    cell.innerText = val;
                    cell.className = 'cell';
                    if (val === "X") cell.classList.add('x');
                    if (val === "O") cell.classList.add('o');
                });
                
                checkWinLocally(data.board);
            };
        }

        cells.forEach(cell => {
            cell.addEventListener('click', (e) => {
                const index = e.target.getAttribute('data-index');
                if (isMyTurn && e.target.innerText === "") {
                    ws.send(JSON.stringify({ action: "move", index: parseInt(index), player: myRole }));
                }
            });
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            if(ws) ws.send(JSON.stringify({ action: "reset" }));
        });

        function checkWinLocally(board) {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let [a, b, c] of wins) {
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    statusText.innerText = `🎉 Player ${board[a]} Wins! 🎉`;
                    isMyTurn = false;
                    return;
                }
            }
            if (!board.includes("")) {
                statusText.innerText = "It's a draw!";
                isMyTurn = false;
            }
        }
    </script>
</body>
</html>
